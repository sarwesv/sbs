<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Phase 0 Spike — Stereo Cesium Performance Test</title>
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/Widgets/widgets.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="stereo">
    <div id="left" class="eye"></div>
    <div id="right" class="eye"></div>
  </div>
  <div id="hud">
    <span id="fps">-- fps</span>
    <span id="mode-label">TOUCH-DRAG MODE</span>
  </div>

  <script>
    // Must be set before Cesium.js loads so it knows where to fetch
    // its workers/assets/widgets from (we're loading Cesium off its own CDN,
    // not bundling it, so this can't be inferred automatically).
    window.CESIUM_BASE_URL = "https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/";
  </script>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/Cesium.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
